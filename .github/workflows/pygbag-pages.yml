name: Build Pygbag Web Game

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: python -m pip install --upgrade pygbag

      - name: Convert audio to OGG for web
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
          rm -f assets/sounds/*.wav
          for file in assets/sounds/*.mp3; do
            [ -e "$file" ] || continue
            ffmpeg -y -i "$file" "${file%.mp3}.ogg"
          done
          rm -f assets/sounds/*.mp3

      - name: Build web version
        run: python -m pygbag --build --ume_block 0 --title "Chess Royale" .

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
