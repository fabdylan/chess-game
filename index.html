<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Royale</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="shell">
        <header class="topbar">
            <div>
                <p class="eyebrow">By fabdylan</p>
                <h1>Chess Game</h1>
            </div>
            <div class="topbar-actions">
                <div class="time-control" role="group" aria-label="Tiempo de partida">
                    <button class="time-button is-active" data-time="10" type="button" aria-pressed="true">10 min</button>
                    <button class="time-button" data-time="5" type="button" aria-pressed="false">5 min</button>
                    <button class="time-button" data-time="3" type="button" aria-pressed="false">3 min</button>
                </div>
                <button id="restartButton" class="primary-button" type="button">Reiniciar</button>
                <button id="flipButton" class="secondary-button" type="button">Girar tablero</button>
            </div>
        </header>

        <main class="layout">
            <section class="board-panel">
                <div class="board-frame">
                    <div id="board" class="board" aria-label="Tablero de ajedrez"></div>
                </div>
            </section>

            <aside class="sidebar">
                <section class="status-panel">
                    <p class="panel-label">Estado</p>
                    <h2 id="statusText">Cargando partida...</h2>
                    <p id="turnText" class="muted">Turno actual</p>
                </section>

                <section class="clock-panel">
                    <div id="whiteClock" class="clock-card">
                        <span class="clock-label">Blancas</span>
                        <strong id="whiteClockText">10:00</strong>
                    </div>
                    <div id="blackClock" class="clock-card">
                        <span class="clock-label">Negras</span>
                        <strong id="blackClockText">10:00</strong>
                    </div>
                </section>

                <section class="history-panel">
                    <div class="history-header">
                        <p class="panel-label">Historial</p>
                        <span id="historyCount" class="muted">0 movimientos</span>
                    </div>
                    <div id="historyList" class="history-list"></div>
                </section>

                <section class="captures-panel">
                    <div>
                        <p class="panel-label">Capturas blancas</p>
                        <div id="whiteCaptures" class="capture-row"></div>
                    </div>
                    <div>
                        <p class="panel-label">Capturas negras</p>
                        <div id="blackCaptures" class="capture-row"></div>
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <script src="app.js?v=2"></script>
</body>
</html>
